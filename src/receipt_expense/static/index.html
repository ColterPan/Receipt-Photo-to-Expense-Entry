<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Receipt → Expense</title>
<style>
  :root { --accent: #1a7f5a; --warn: #b45309; --err: #b91c1c; --border: #d8d4cc; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; margin: 0; background: #f6f4ef; color: #222; }
  main { max-width: 560px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 1.3rem; margin: 8px 0 2px; }
  .sub { color: #666; font-size: .85rem; margin-bottom: 14px; }
  .card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
  button { font-size: 1rem; padding: 12px 18px; border-radius: 8px; border: 1px solid var(--border); background: #fff; cursor: pointer; }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button:disabled { opacity: .5; cursor: default; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  video, img.preview { width: 100%; border-radius: 8px; background: #000; }
  #result table { width: 100%; border-collapse: collapse; font-size: .92rem; }
  #result td { padding: 5px 8px; border-bottom: 1px solid #eee; vertical-align: top; }
  #result td:first-child { color: #777; white-space: nowrap; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: .8rem; font-weight: 600; color: #fff; }
  .badge.ok { background: var(--accent); } .badge.review { background: var(--warn); }
  .error { color: var(--err); font-weight: 600; }
  .muted { color: #777; font-size: .82rem; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 3px solid #ccc; border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; vertical-align: -3px; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  input[type=file] { display: none; }
</style>
</head>
<body>
<main>
  <h1>Receipt → Expense</h1>
  <div class="sub" id="info">Loading…</div>

  <div class="card" id="captureCard">
    <video id="video" autoplay playsinline hidden></video>
    <img id="preview" class="preview" hidden alt="Receipt preview">
    <div class="row" style="margin-top:10px">
      <button id="startCam">Use camera</button>
      <button id="snap" class="primary" hidden>Snap receipt</button>
      <button id="pickFile">Choose photo</button>
      <button id="submit" class="primary" hidden>Process receipt</button>
      <button id="retake" hidden>Retake</button>
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment">
    <p class="muted" id="camNote" hidden>Live camera needs http://localhost (PC). On your phone, use “Choose photo” — it opens the camera app.</p>
  </div>

  <div class="card" id="status" hidden></div>
  <div class="card" id="result" hidden></div>
</main>

<script>
const $ = (id) => document.getElementById(id);
let stream = null, pendingBlob = null;

async function loadInfo() {
  try {
    const r = await fetch("/api/info");
    const d = await r.json();
    let txt = `Writing to ${d.expense_file} · Phone: open ${d.lan_url}`;
    if (!d.api_key_configured) txt += " · ⚠ API key not configured (.env)";
    $("info").textContent = txt;
  } catch { $("info").textContent = "Could not load server info."; }
}
loadInfo();

$("startCam").onclick = async () => {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    $("video").srcObject = stream;
    $("video").hidden = false;
    $("preview").hidden = true;
    $("snap").hidden = false;
    $("startCam").hidden = true;
  } catch (e) {
    $("camNote").hidden = false;
  }
};

$("snap").onclick = () => {
  const v = $("video");
  const canvas = document.createElement("canvas");
  canvas.width = v.videoWidth; canvas.height = v.videoHeight;
  canvas.getContext("2d").drawImage(v, 0, 0);
  canvas.toBlob((blob) => setPending(blob), "image/jpeg", 0.92);
};

$("pickFile").onclick = () => $("fileInput").click();
$("fileInput").onchange = () => {
  const f = $("fileInput").files[0];
  if (f) setPending(f);
};

function setPending(blob) {
  pendingBlob = blob;
  stopCamera();
  $("preview").src = URL.createObjectURL(blob);
  $("preview").hidden = false;
  $("video").hidden = true;
  $("snap").hidden = true;
  $("startCam").hidden = true;
  $("pickFile").hidden = true;
  $("submit").hidden = false;
  $("retake").hidden = false;
}

function resetCapture() {
  pendingBlob = null;
  $("preview").hidden = true;
  $("submit").hidden = true;
  $("retake").hidden = true;
  $("startCam").hidden = false;
  $("pickFile").hidden = false;
  $("fileInput").value = "";
}

$("retake").onclick = resetCapture;

$("submit").onclick = async () => {
  if (!pendingBlob) return;
  $("submit").disabled = true;
  $("status").hidden = false;
  $("status").innerHTML = '<span class="spinner"></span>Reading receipt with Claude…';
  $("result").hidden = true;
  try {
    const form = new FormData();
    form.append("file", pendingBlob, "receipt.jpg");
    const r = await fetch("/api/receipts", { method: "POST", body: form });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || `Server error (${r.status})`);
    showResult(d);
    $("status").hidden = true;
  } catch (e) {
    $("status").innerHTML = `<span class="error">Failed:</span> ${e.message}`;
  } finally {
    $("submit").disabled = false;
    resetCapture();  // ready for the next receipt immediately
  }
};

function showResult(d) {
  const badge = d.status === "OK"
    ? '<span class="badge ok">OK</span>'
    : '<span class="badge review">NEEDS REVIEW</span>';
  const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  $("result").innerHTML = `
    <p style="margin:0 0 8px">Row ${esc(d.row_number)} written ${badge}</p>
    <table>
      <tr><td>Vendor</td><td>${esc(d.vendor)}</td></tr>
      <tr><td>Amount</td><td>${d.amount == null ? "—" : esc(d.amount)} ${esc(d.currency)}</td></tr>
      <tr><td>Date</td><td>${esc(d.date) || "—"}</td></tr>
      <tr><td>Category</td><td>${esc(d.category)}</td></tr>
      ${d.notes ? `<tr><td>Notes</td><td>${esc(d.notes)}</td></tr>` : ""}
    </table>
    <p class="muted">Photo archived: ${esc(d.image_path)}</p>`;
  $("result").hidden = false;
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach((t) => t.stop()); stream = null; }
}
</script>
</body>
</html>
